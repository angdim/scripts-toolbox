name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run slow/e2e media tests"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  linux:
    name: Linux Python/Bash tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg shellcheck shfmt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Static quality gates
        run: |
          ruff check tools packages tests --exclude '*/.venv/*' --exclude '__pycache__'
          PYFILES=$(find tools packages tests -type f -name '*.py' -not -path '*/.venv/*' -not -path '*/__pycache__/*' | tr '\n' ' ')
          mypy $PYFILES
          shellcheck $(find tools bootstrap -type f -name '*.sh' -not -path '*/.venv/*' | sort)
          for f in $(find tools bootstrap -type f -name '*.sh' -not -path '*/.venv/*' | sort); do bash -n "$f"; done
          tools/catalog/python/scripts_catalog.py validate

      - name: Run default tests
        run: python -m pytest -q

      - name: Run optional e2e tests
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e == 'true' }}
        run: python -m pytest -q -m "e2e"

  windows:
    name: Windows PowerShell tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck

      - name: PowerShell parser check
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path tools,bootstrap -Recurse -File -Filter *.ps1 | Where-Object { $_.FullName -notmatch '\.venv|__pycache__' }
          foreach ($file in $files) {
            [scriptblock]::Create((Get-Content -Raw $file.FullName)) | Out-Null
          }

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -Path tests/powershell -CI

      - name: Run Windows-marked pytest tests
        shell: pwsh
        run: python -m pytest -q -m "windows or powershell"
