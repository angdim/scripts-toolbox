# mp3_profiles.ini
#
# Профили за ffmpeg конвертиране към MP3.
# Всеки профил е секция [name] с ключ:
#   params=...
#
# Секция [defaults] задава стойности по подразбиране за:
#   delete_original_audio
#   delete_original_video

[defaults]
delete_original_audio=no
delete_original_video=no

[music]
# Високо качество за музика: 320 kbps, 44.1 kHz, стерео
params=-codec:a libmp3lame -b:a 320k -ar 44100 -ac 2

[music_medium]
# Добро качество, по-малък размер: 192 kbps
params=-codec:a libmp3lame -b:a 192k -ar 44100 -ac 2

[music_medium48]
# Добро качество, по-малък размер: 192 kbps
params=-codec:a libmp3lame -b:a 192k -ar 48000 -ac 2

[speech]
# Говор / подкаст: 96 kbps, 22.05 kHz, моно
params=-codec:a libmp3lame -b:a 96k -ar 22050 -ac 1

[mono_low]
# Моно, нисък битрейт: 64 kbps, моно
params=-codec:a libmp3lame -b:a 64k -ac 1

[transparent]
# „Прозрачно“ качество (VBR)
params=-codec:a libmp3lame -qscale:a 0
